<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#fcfcfd"/>
  <!-- Thermal paper style card -->
  <rect x="50" y="10" width="300" height="280" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 2"/>
  
  <!-- Receipt Header -->
  <text x="200" y="35" font-family="Courier, monospace" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">SUPERIOR RETAIL LTD</text>
  <text x="200" y="48" font-family="Courier, monospace" font-size="8" fill="#64748b" text-anchor="middle">100 Broadway St, New York, NY</text>
  <text x="200" y="58" font-family="Courier, monospace" font-size="8" fill="#64748b" text-anchor="middle">Tel: (555) 019-2834</text>
  
  <!-- Dashed Divider -->
  <line x1="60" y1="70" x2="340" y2="70" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
  
  <!-- Transaction Details -->
  <text x="70" y="85" font-family="Courier, monospace" font-size="8" fill="#334155">INV: #INV-SMB-930</text>
  <text x="330" y="85" font-family="Courier, monospace" font-size="8" fill="#334155" text-anchor="end">DATE: 2026-06-29</text>
  <text x="70" y="98" font-family="Courier, monospace" font-size="8" fill="#334155">CASHIER: #402 (M. Smith)</text>
  <text x="330" y="98" font-family="Courier, monospace" font-size="8" fill="#334155" text-anchor="end">TYPE: CHARGE SALE</text>
  
  <line x1="60" y1="108" x2="340" y2="108" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
  
  <!-- Billed To -->
  <text x="70" y="122" font-family="Courier, monospace" font-size="8" font-weight="bold" fill="#e11d48">SOLD TO:</text>
  <text x="120" y="122" font-family="Courier, monospace" font-size="8" fill="#0f172a">John Doe Customer (555-0199)</text>
  
  <line x1="60" y1="132" x2="340" y2="132" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Items Table -->
  <text x="70" y="148" font-family="Courier, monospace" font-size="8" font-weight="bold" fill="#334155">ITEM DESCRIPTION</text>
  <text x="250" y="148" font-family="Courier, monospace" font-size="8" font-weight="bold" fill="#334155" text-anchor="end">QTY</text>
  <text x="330" y="148" font-family="Courier, monospace" font-size="8" font-weight="bold" fill="#334155" text-anchor="end">TOTAL</text>
  
  <!-- Item 1 -->
  <text x="70" y="168" font-family="Courier, monospace" font-size="8" fill="#334155">Organic Soy Candle Set</text>
  <text x="250" y="168" font-family="Courier, monospace" font-size="8" fill="#334155" text-anchor="end">4</text>
  <text x="330" y="168" font-family="Courier, monospace" font-size="8" fill="#334155" text-anchor="end">$100.00</text>
  
  <!-- Item 2 -->
  <text x="70" y="182" font-family="Courier, monospace" font-size="8" fill="#334155">Engraved Gift Box</text>
  <text x="250" y="182" font-family="Courier, monospace" font-size="8" fill="#334155" text-anchor="end">2</text>
  <text x="330" y="182" font-family="Courier, monospace" font-size="8" fill="#334155" text-anchor="end">$90.00</text>
  
  <line x1="60" y1="195" x2="340" y2="195" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
  
  <!-- Totals Section -->
  <text x="70" y="210" font-family="Courier, monospace" font-size="8" fill="#475569">SUBTOTAL:</text>
  <text x="330" y="210" font-family="Courier, monospace" font-size="8" fill="#0f172a" text-anchor="end">$190.00</text>
  <text x="70" y="222" font-family="Courier, monospace" font-size="8" fill="#475569">TAX (8.25%):</text>
  <text x="330" y="222" font-family="Courier, monospace" font-size="8" fill="#0f172a" text-anchor="end">$15.68</text>
  <text x="70" y="238" font-family="Courier, monospace" font-size="10" font-weight="bold" fill="#0f172a">TOTAL CHARGE:</text>
  <text x="330" y="238" font-family="Courier, monospace" font-size="11" font-weight="bold" fill="#e11d48" text-anchor="end">$205.68</text>
  
  <line x1="60" y1="250" x2="340" y2="250" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
  
  <!-- Simulated Barcode -->
  <g fill="#0f172a">
    <rect x="120" y="260" width="3" height="15"/>
    <rect x="126" y="260" width="1" height="15"/>
    <rect x="130" y="260" width="4" height="15"/>
