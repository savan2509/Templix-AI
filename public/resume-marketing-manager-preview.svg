<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#faf5ff"/>
  <rect x="15" y="15" width="370" height="270" rx="10" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  
  <!-- Right column accent visual: Campaign growth bar chart -->
  <g transform="translate(290, 30)" opacity="0.4">
    <rect x="0" y="15" width="12" height="15" fill="#7c3aed" rx="1"/>
    <rect x="16" y="5" width="12" height="25" fill="#7c3aed" rx="1"/>
    <rect x="32" y="0" width="12" height="30" fill="#7c3aed" rx="1"/>
    <path d="M-5 25 L10 18 L26 8 L42 2" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="42" cy="2" r="2.5" fill="#7c3aed"/>
  </g>
  
  <!-- Left Side Header Info -->
  <g transform="translate(35, 35)">
    <text x="0" y="12" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#581c87">Marcus Chen, MBA</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#7c3aed">Growth Marketing Manager &amp; Campaign Architect</text>
    <text x="0" y="34" font-family="system-ui, sans-serif" font-size="7.5" fill="#6b21a8">m.chen@growthmetrics.com | ROI Analytics Certified</text>
  </g>
  
  <line x1="35" y1="80" x2="365" y2="80" stroke="#f3e8ff" stroke-width="1.5"/>
  
  <!-- Metrics Dashboard display box -->
  <g transform="translate(35, 88)">
    <rect x="0" y="0" width="330" height="38" rx="4" fill="#faf5ff" stroke="#f3e8ff" stroke-width="1"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#7c3aed">VERIFIED CAMPAIGN GROWTH METRICS:</text>
    
    <text x="10" y="27" font-family="system-ui, sans-serif" font-size="8" fill="#18181b">Channels: <tspan font-weight="bold">SEO, Google Ads, Meta Ads</tspan> | Ad Budget Managed: <tspan font-weight="bold">$250K/mo</tspan> | ROI: <tspan font-weight="bold">320% Avg</tspan></text>
  </g>
  
  <!-- Detailed Professional sections -->
  <g transform="translate(35, 140)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#7c3aed" letter-spacing="0.5">EXECUTIVE SUMMARY</text>
    <line x1="0" y1="13" x2="330" y2="13" stroke="#faf5ff" stroke-width="1.5"/>
    <text x="0" y="23" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Results-driven MBA marketer with 7+ years directing digital campaign growth channels, managing SEO,</text>
    <text x="0" y="32" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">paid ads budgets, and engineering conversion funnels to scale business customer acquisition rates.</text>
    
    <text x="0" y="52" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#7c3aed" letter-spacing="0.5">CAMPAIGN ACCOMPLISHMENTS</text>
    <line x1="0" y1="57" x2="330" y2="57" stroke="#faf5ff" stroke-width="1.5"/>
    
    <!-- Experience 1 -->
    <text x="0" y="69" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Marketing Director — ScaleMedia Corp</text>
    <text x="330" y="69" font-family="system-ui, sans-serif" font-size="7" fill="#7c3aed" text-anchor="end">2023 - Present</text>
    <circle cx="3" cy="79" r="1.5" fill="#7c3aed"/>
    <text x="10" y="82" font-family="system-ui, sans-serif" font-size="7.5" fill="#334155">Scaled organic search impressions by 185% using data-driven search keyword strategies</text>
    <circle cx="3" cy="89" r="1.5" fill="#7c3aed"/>
    <text x="10" y="92" font-family="system-ui, sans-serif" font-size="7.5" fill="#334155">Managed $2.4M annualized Google Search Ad spend, achieving 3.5x conversion lift</text>
    
    <!-- Experience 2 -->
    <text x="0" y="112" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Paid Ads Manager — AgencyOne</text>
  </g>
</svg>
