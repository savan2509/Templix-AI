<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Artistic soft grey bg -->
  <rect width="100%" height="100%" fill="#faf5f5"/>
  <rect x="20" y="20" width="360" height="260" rx="16" fill="#ffffff" stroke="#f0e4e4" stroke-width="1.5"/>
  
  <!-- Creative pink background blob top right -->
  <circle cx="340" cy="60" r="45" fill="#db2777" opacity="0.08"/>
  
  <!-- Asymmetric Designer Info -->
  <g transform="translate(40, 45)">
    <!-- Designer Initials Logo badge -->
    <circle cx="15" cy="15" r="15" fill="#db2777"/>
    <text x="15" y="19" font-family="'Georgia', serif" font-weight="bold" font-size="12" fill="#ffffff" text-anchor="middle">c</text>
    
    <text x="40" y="13" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#0f172a">CREATIVE STUDIO</text>
    <text x="40" y="25" font-family="system-ui, sans-serif" font-size="7" fill="#6b7280">PORTFOLIO: design-creatives.io/sarah</text>
  </g>
  
  <!-- Right column: Reference billing info -->
  <text x="340" y="55" font-family="system-ui, sans-serif" font-weight="extrabold" font-size="11" fill="#db2777" text-anchor="end">DESIGN INVOICE</text>
  <text x="340" y="67" font-family="system-ui, sans-serif" font-size="7.5" fill="#9ca3af" text-anchor="end">PHASE 2 DEPLOYMENT</text>
  <text x="340" y="77" font-family="system-ui, sans-serif" font-size="7.5" fill="#9ca3af" text-anchor="end">Ref: #INV-CREAT-202</text>
  
  <line x1="40" y1="95" x2="340" y2="95" stroke="#f3e8ff" stroke-width="1"/>
  
  <!-- Client Detail Box -->
  <text x="40" y="112" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#db2777">CLIENT PARTNER</text>
  <text x="40" y="125" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#0f172a">Brightside Media Ltd</text>
  <text x="40" y="135" font-family="system-ui, sans-serif" font-size="7" fill="#6b7280">Branding, Illustration &amp; Graphic Layout Project</text>
  
  <!-- Elegant Creative Item Breakdown list -->
  <!-- Header -->
  <text x="40" y="160" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#db2777">DESIGN SERVICE COMPONENT</text>
  <text x="340" y="160" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#db2777" text-anchor="end">FEE</text>
  <line x1="40" y1="166" x2="340" y2="166" stroke="#f0e4e4" stroke-width="1.5"/>
  
  <!-- Flat fee -->
  <text x="40" y="180" font-family="system-ui, sans-serif" font-size="8" fill="#1f2937">Flat Project Fee (Brand Visual System &amp; UI assets)</text>
  <text x="340" y="180" font-family="system-ui, sans-serif" font-size="8" font-weight="semibold" fill="#1f2937" text-anchor="end">$4,500.00</text>
  <line x1="40" y1="188" x2="340" y2="188" stroke="#f9fafb" stroke-width="1"/>
  
  <!-- Hourly revisions -->
  <text x="40" y="202" font-family="system-ui, sans-serif" font-size="8" fill="#1f2937">Design Revisions (10 revisions @ $65.00/rev)</text>
  <text x="340" y="202" font-family="system-ui, sans-serif" font-size="8" font-weight="semibold" fill="#1f2937" text-anchor="end">$650.00</text>
  <line x1="40" y1="210" x2="340" y2="210" stroke="#f9fafb" stroke-width="1"/>
  
  <!-- Extra hours -->
  <text x="40" y="224" font-family="system-ui, sans-serif" font-size="8" fill="#1f2937">Branding Consulting &amp; Assets Export (5 hrs @ $80.00/hr)</text>
  <text x="340" y="224" font-family="system-ui, sans-serif" font-size="8" font-weight="semibold" fill="#1f2937" text-anchor="end">$400.00</text>
  
  <line x1="40" y1="234" x2="340" y2="234" stroke="#db2777" stroke-width="1"/>
  
  <!-- Total Due -->
  <text x="240" y="254" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#4b5563" text-anchor="end">Amount Due Phase 2:</text>
  <text x="340" y="254" font-family="system-ui, sans-serif" font-size="12" font-weight="extrabold" fill="#db2777" text-anchor="end">$5,550.00</text>
  
  <text x="40" y="272" font-family="system-ui, sans-serif" font-size="7.5" fill="#9ca3af">All raw Vector design layers transferred on transaction completion.</text>
</svg>
