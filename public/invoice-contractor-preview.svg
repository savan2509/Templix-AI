  <path d="M350 284 L380 254 L380 262 L358 284 Z" fill="#ea580c" opacity="0.15"/>
  <path d="M362 284 L380 266 L380 274 L370 284 Z" fill="#ea580c" opacity="0.15"/>
  
  <!-- Header Info -->
  <text x="35" y="45" font-family="Impact, Charcoal, sans-serif" font-size="16" fill="#ea580c" letter-spacing="1">VANGUARD BUILDERS</text>
  <text x="35" y="58" font-family="system-ui, sans-serif" font-size="7.5" font-weight="bold" fill="#44403c">LICENSE #: #LIC-BUILD-2938A</text>
  <text x="35" y="68" font-family="system-ui, sans-serif" font-size="7.5" fill="#78716c">General Construction, Refits &amp; Logistical Contracting</text>
  
  <!-- Top Right info block -->
  <rect x="250" y="32" width="120" height="38" rx="2" fill="#fafaf9" stroke="#e7e5e4"/>
