  <text x="310" y="55" font-family="system-ui, sans-serif" font-size="8" font-weight="semibold" fill="#1c1917" text-anchor="middle">#INV-CONT-441</text>
  
  <line x1="35" y1="80" x2="370" y2="80" stroke="#ea580c" stroke-width="1"/>
  
  <!-- Site details grid -->
  <text x="35" y="93" font-family="system-ui, sans-serif" font-size="7.5" font-weight="bold" fill="#ea580c">PROJECT SITE ADDRESS:</text>
