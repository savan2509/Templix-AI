  <text x="43" y="167" font-family="system-ui, sans-serif" font-size="8" fill="#1c1917">Structural Steel Rebar &amp; Reinforcements</text>
  <text x="360" y="167" font-family="system-ui, sans-serif" font-size="8" font-weight="semibold" fill="#1c1917" text-anchor="end">$1,850.00</text>
  
