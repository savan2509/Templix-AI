  <text x="35" y="113" font-family="system-ui, sans-serif" font-size="7.5" fill="#78716c">General Contractor Project Lead: Sarah Jenkins</text>
  
  <!-- Labor and Material tables -->
  <!-- Materials Header -->
  <rect x="35" y="126" width="335" height="15" fill="#44403c" rx="2"/>
  <text x="43" y="137" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#ffffff">Logistical Materials &amp; Building Components</text>
  <text x="360" y="137" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" text-anchor="end">Cost</text>
  
  <text x="43" y="154" font-family="system-ui, sans-serif" font-size="8" fill="#1c1917">Concrete Foundation Mix (120 SqF Pouring)</text>
