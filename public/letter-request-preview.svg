<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#e0e7ff"/>
  <rect x="15" y="15" width="370" height="270" rx="8" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.2"/>
  
  <!-- Indigo top header border -->
  <rect x="15" y="15" width="370" height="12" fill="#4f46e5" rx="4"/>
  
  <!-- Header Info -->
  <g transform="translate(35, 45)">
    <text x="0" y="12" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#312e81">FORMAL REQUEST APPLICATION</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8" fill="#4f46e5">Official Request | Subject Scope, Reasoning &amp; Deadlines</text>
  </g>
  
  <line x1="35" y1="74" x2="365" y2="74" stroke="#c7d2fe" stroke-width="1"/>
  
  <!-- Sender and Date -->
  <g transform="translate(35, 88)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#4f46e5">REQUESTOR APPLICANT:</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1f2937">Jane Doe Lead Engineer</text>
    
    <text x="180" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#4f46e5">APPROVING AUTHORITY:</text>
    <text x="180" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1f2937">Marcus Jenkins VP</text>
  </g>
  
  <!-- Request Subject callout bar -->
  <g transform="translate(35, 128)">
    <rect x="0" y="0" width="330" height="38" rx="4" fill="#e0e7ff" stroke="#c7d2fe" stroke-width="0.75"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#312e81">REQUEST SUBJECT LINE:</text>
    <text x="10" y="26" font-family="system-ui, sans-serif" font-size="8.5" font-weight="semibold" fill="#1f2937">Request: Project Budget Increase for QA Automation tools</text>
  </g>
  
  <!-- Details & Deadline -->
  <g transform="translate(35, 180)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#4f46e5">REASONING &amp; SUBMISSION TIMELINES</text>
    <line x1="0" y1="14" x2="330" y2="14" stroke="#c7d2fe" stroke-width="1.5"/>
    
    <text x="0" y="27" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Reason: <tspan font-weight="semibold">Automating QA saves 40 engineering hours per release sprint.</tspan></text>
    <line x1="0" y1="35" x2="330" y2="35" stroke="#fafafa" stroke-width="1"/>
    
    <text x="0" y="47" font-family="system-ui, sans-serif" font-size="8" fill="#374151">Urgency Deadline | Supporting Documentation</text>
    <text x="330" y="47" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#4f46e5" text-anchor="end">2026-11-15 | ROI_Doc.pdf Attached</text>
  </g>
  
  <text x="35" y="272" font-family="system-ui, sans-serif" font-size="7" fill="#818cf8">Submitted for executive review and corporate budget sign-offs.</text>
</svg>
