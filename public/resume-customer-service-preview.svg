<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#e0e7ff" opacity="0.4"/>
  <rect x="15" y="15" width="370" height="270" rx="10" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.2"/>
  
  <!-- Star satisfaction ratings decorations top right -->
  <g transform="translate(300, 32)">
    <!-- Star 1 -->
    <path d="M0 5 L3 8 L8 8 L4 11 L6 16 L0 13 L-6 16 L-4 11 L-8 8 L-3 8 Z" fill="#4f46e5"/>
    <!-- Star 2 -->
    <path d="M12 5 L15 8 L20 8 L16 11 L18 16 L12 13 L6 16 L8 11 L4 8 L9 8 Z" fill="#4f46e5"/>
    <!-- Star 3 -->
    <path d="M24 5 L27 8 L32 8 L28 11 L30 16 L24 13 L18 16 L20 11 L16 8 L21 8 Z" fill="#4f46e5"/>
    <text x="38" y="13" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#4f46e5">CSAT: 98%</text>
  </g>
  
  <!-- Header Info -->
  <g transform="translate(35, 30)">
    <text x="0" y="12" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e1b4b">Sarah Jenkins</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#4f46e5">Bilingual Customer Support Specialist</text>
    <text x="0" y="34" font-family="system-ui, sans-serif" font-size="7.5" fill="#6366f1">Tel: (555) 0199 | s.jenkins@support-center.org | SLA Response: 5 mins avg</text>
  </g>
  
  <line x1="35" y1="74" x2="365" y2="74" stroke="#e0e7ff" stroke-width="1.5"/>
  
  <!-- Ticketing and Bilingual Systems Info Box -->
  <g transform="translate(35, 82)">
    <rect x="0" y="0" width="330" height="38" rx="4" fill="#faf5ff" stroke="#e0e7ff" stroke-width="1"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#4f46e5">SUPPORT PLATFORMS &amp; SYSTEMS:</text>
    <text x="10" y="26" font-family="system-ui, sans-serif" font-size="8" fill="#18181b">Ticketing: <tspan font-weight="bold">Zendesk, Intercom, Salesforce CRM</tspan> | Languages: <tspan font-weight="bold">English &amp; Spanish (Bilingual)</tspan></text>
  </g>
  
  <!-- Core Support Sections -->
  <g transform="translate(35, 132)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#4f46e5" letter-spacing="0.5">SUPPORT PROFILE SUMMARY</text>
    <line x1="0" y1="13" x2="330" y2="13" stroke="#e0e7ff" stroke-width="1"/>
    <text x="0" y="23" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Dedicated customer success professional with 5+ years handling enterprise SLA tickets, resolving technical</text>
    <text x="0" y="32" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">inquiries, and maintaining high client satisfaction scores (98% CSAT average). Bilingual communicator.</text>
    
    <text x="0" y="52" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#4f46e5" letter-spacing="0.5">PROFESSIONAL SUPPORT HISTORY</text>
    <line x1="0" y1="57" x2="330" y2="57" stroke="#e0e7ff" stroke-width="1"/>
    
    <!-- Experience 1 -->
    <text x="0" y="69" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Senior Support Specialist — CloudTech Solutions</text>
    <text x="330" y="69" font-family="system-ui, sans-serif" font-size="7" fill="#4f46e5" text-anchor="end">2023 - Present</text>
    <text x="0" y="80" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">✔ Maintained average ticket response times below 5 minutes for Priority 1 SLAs</text>
    <text x="0" y="89" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">✔ Handled Zendesk ticket logs for 1,200+ active enterprise customer accounts</text>
    
    <!-- Experience 2 -->
    <text x="0" y="108" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Customer Support Agent — HelpDesk Center</text>
  </g>
</svg>
