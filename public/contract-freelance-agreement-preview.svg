<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#fafdfd"/>
  <!-- Classic legal double-line border -->
  <rect x="15" y="15" width="370" height="270" rx="4" fill="#ffffff" stroke="#0d9488" stroke-width="1.5"/>
  <rect x="19" y="19" width="362" height="262" rx="2" fill="none" stroke="#0d9488" stroke-width="0.5"/>
  
  <!-- Scale of Justice watermark icon in background -->
  <path d="M200 65 L200 120 M175 80 L225 80 M175 80 L160 105 L190 105 Z M225 80 L210 105 L240 105 Z M185 120 L215 120" stroke="#0d9488" stroke-width="1.2" fill="none" opacity="0.1" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Header Info -->
  <g transform="translate(40, 45)">
    <text x="0" y="12" font-family="'Times New Roman', Times, serif" font-size="14" font-weight="bold" fill="#0f172a">MUTUAL SERVICES AGREEMENT</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="7.5" fill="#64748b">Agreement Effective Date: October 24, 2026</text>
    <text x="0" y="34" font-family="system-ui, sans-serif" font-size="7.5" fill="#64748b">Parties: Client Organization &amp; Independent Contractor</text>
  </g>
  
  <line x1="40" y1="92" x2="360" y2="92" stroke="#0d9488" stroke-width="0.75"/>
  
  <!-- Content blocks simulating legal sections -->
  <g transform="translate(40, 108)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#0d9488">1. SERVICES DESCRIPTION &amp; SCOPE</text>
    <rect x="0" y="14" width="320" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="0" y="22" width="280" height="4" rx="2" fill="#e2e8f0"/>
    
    <text x="0" y="42" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#0d9488">2. PAYMENT CONSIDERATION</text>
    <!-- Little fee badge -->
    <rect x="0" y="48" width="160" height="15" rx="3" fill="#ccfbf1" stroke="#2dd4bf" stroke-width="0.75"/>
    <text x="8" y="58" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#0f766e">Retainer Payment: $5,000.00 Flat</text>
    
    <text x="0" y="82" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#0d9488">3. INTELLECTUAL PROPERTY &amp; IP TRANSFER</text>
    <rect x="0" y="88" width="320" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="0" y="96" width="300" height="4" rx="2" fill="#e2e8f0"/>
  </g>
  
  <!-- Bottom signatures lines -->
  <g transform="translate(40, 230)">
    <line x1="0" y1="15" x2="110" y2="15" stroke="#94a3b8" stroke-width="1"/>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Client Authorized Representative</text>
    
    <line x1="210" y1="15" x2="320" y2="15" stroke="#94a3b8" stroke-width="1"/>
    <text x="210" y="24" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Contractor Representative Signature</text>
  </g>
</svg>
