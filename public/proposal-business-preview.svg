<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="15" y="15" width="370" height="270" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  
  <!-- Right side header graphic: Goal growth target dart -->
  <g transform="translate(315, 30)" opacity="0.3">
    <!-- Concentric circles representing target -->
    <circle cx="20" cy="20" r="20" stroke="#2563eb" stroke-width="1.5" fill="none"/>
    <circle cx="20" cy="20" r="12" stroke="#2563eb" stroke-width="1.5" fill="none"/>
    <circle cx="20" cy="20" r="4" fill="#2563eb"/>
    <!-- Arrow graphic -->
    <line x1="-5" y1="45" x2="16" y2="24" stroke="#2563eb" stroke-width="2"/>
    <polygon points="16,24 10,24 16,30" fill="#2563eb"/>
  </g>
  
  <!-- Header Info -->
  <g transform="translate(35, 45)">
    <text x="0" y="12" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">BUSINESS VENTURE PROPOSAL</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8" fill="#475569">Startup Pitch Deck | Solution Title &amp; Capital Investment Plan</text>
  </g>
  
  <line x1="35" y1="80" x2="365" y2="80" stroke="#e2e8f0" stroke-width="1.2"/>
  
  <!-- Client Detail Box -->
  <g transform="translate(35, 93)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#2563eb">PREPARED FOR:</text>
    <text x="0" y="20" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#0f172a">Brightside Venture Partners LLC</text>
    <text x="0" y="30" font-family="system-ui, sans-serif" font-size="7.5" fill="#64748b">Proposal Submission Date: October 24, 2026</text>
  </g>
  
  <!-- Solution and Timeline -->
  <g transform="translate(35, 140)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#2563eb">1. SOLUTION TITLE &amp; TIMELINE</text>
    <rect x="0" y="14" width="330" height="4" rx="2" fill="#f1f5f9"/>
    <text x="0" y="31" font-family="system-ui, sans-serif" font-size="8" fill="#1e293b">Venture Title: <tspan font-weight="bold">Enterprise Cloud ERP</tspan> | Timeline: <tspan font-weight="bold">12 Months</tspan></text>
  </g>
  
  <!-- Investment and ROI blocks -->
  <g transform="translate(35, 192)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#2563eb">2. REQUIRED INVESTMENT &amp; RETURNS</text>
    <line x1="0" y1="14" x2="330" y2="14" stroke="#e2e8f0" stroke-width="1.5"/>
    
    <text x="0" y="27" font-family="system-ui, sans-serif" font-size="8" fill="#1e293b">Required Capital Investment Budget</text>
    <text x="330" y="27" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b" text-anchor="end">$250,000.00</text>
    <line x1="0" y1="35" x2="330" y2="35" stroke="#fafafa" stroke-width="1"/>
    
    <text x="0" y="47" font-family="system-ui, sans-serif" font-size="8" fill="#1e293b">Projected Year One ROI Metrics</text>
    <text x="330" y="47" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#2563eb" text-anchor="end">185% Increase</text>
  </g>
  
  <text x="35" y="272" font-family="system-ui, sans-serif" font-size="7" fill="#94a3b8">This business proposal is valid for 60 days from submission date.</text>
</svg>
