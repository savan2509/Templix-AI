<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#f1f5f9"/>
  <!-- Classic elegant border for certificate look -->
  <rect x="15" y="15" width="370" height="270" rx="4" fill="#ffffff" stroke="#475569" stroke-width="1.8"/>
  <rect x="20" y="20" width="360" height="260" rx="2" fill="none" stroke="#64748b" stroke-width="0.5"/>
  
  <!-- Ribbon seal graphic watermark in center background -->
  <g transform="translate(185, 90)" fill="none" stroke="#64748b" stroke-width="1" opacity="0.15">
    <circle cx="15" cy="15" r="15"/>
    <path d="M5 25 L0 45 L15 35 L30 45 L25 25"/>
  </g>
  
  <!-- Header Info -->
  <g transform="translate(40, 45)">
    <text x="160" y="12" font-family="'Times New Roman', Times, serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">WORK EXPERIENCE CERTIFICATE</text>
    <text x="160" y="24" font-family="system-ui, sans-serif" font-size="7.5" fill="#64748b" text-anchor="middle">TO WHOM IT MAY CONCERN</text>
  </g>
  
  <line x1="40" y1="82" x2="360" y2="82" stroke="#cbd5e1" stroke-width="0.75"/>
  
  <!-- Employee details -->
  <g transform="translate(40, 98)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" fill="#475569">This is to certify that the employee partner:</text>
    <text x="0" y="20" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#0f172a">John Doe Employee</text>
    
    <text x="0" y="36" font-family="system-ui, sans-serif" font-size="8" fill="#475569">was employed with the organization:</text>
    <text x="0" y="48" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#0f172a">Vanguard Corporation LLC</text>
  </g>
  
  <!-- Job details -->
  <g transform="translate(40, 162)">
    <rect x="0" y="0" width="320" height="38" rx="3" fill="#f8fafc" stroke="#cbd5e1" stroke-width="0.75"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#475569">JOB EXPERIENCE DETAILS:</text>
    <text x="10" y="26" font-family="system-ui, sans-serif" font-size="8" fill="#1e293b">Job Title: <tspan font-weight="bold">Senior Frontend Architect</tspan> | Tenure: <tspan font-weight="bold">2022 - 2026</tspan></text>
  </g>
  
  <!-- Performance Summary -->
  <g transform="translate(40, 212)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Performance Summary: <tspan font-style="italic">"Demonstrated excellent architectural skills and team leadership."</tspan></text>
  </g>
  
  <!-- Sign off -->
  <g transform="translate(40, 235)">
    <line x1="210" y1="20" x2="320" y2="20" stroke="#94a3b8" stroke-width="0.75"/>
    <text x="210" y="28" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Authorized Signatory (HR Director)</text>
  </g>
</svg>
