<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <rect x="15" y="15" width="370" height="270" rx="4" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.2"/>
  
  <!-- Centered Professional Header -->
  <g transform="translate(200, 30)">
    <text x="0" y="12" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">SARAH JENKINS, PMP</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#475569" text-anchor="middle">Senior IT Project Manager &amp; Agile Leader</text>
    <text x="0" y="34" font-family="system-ui, sans-serif" font-size="7" fill="#64748b" text-anchor="middle">New York, NY | s.jenkins@pmp-agile.com | linkedin.com/in/sarah-jenkins-pmp</text>
  </g>
  
  <line x1="30" y1="72" x2="370" y2="72" stroke="#e2e8f0" stroke-width="1.2"/>
  
  <!-- Agile Certifications / Highlights pill list -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="85" height="15" rx="3" fill="#334155"/>
    <text x="42" y="10.5" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ffffff" text-anchor="middle">PMP CERTIFIED</text>
    
    <rect x="95" y="0" width="95" height="15" rx="3" fill="#475569"/>
    <text x="142" y="10.5" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ffffff" text-anchor="middle">SCRUM MASTER (CSM)</text>
    
    <rect x="200" y="0" width="70" height="15" rx="3" fill="#475569"/>
    <text x="235" y="10.5" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ffffff" text-anchor="middle">BUDGETS: $2M+</text>
    
    <rect x="280" y="0" width="90" height="15" rx="3" fill="#334155"/>
    <text x="325" y="10.5" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ffffff" text-anchor="middle">AGILE COACHING</text>
  </g>
  
  <!-- Professional Summary -->
  <g transform="translate(30, 108)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7.5" font-weight="bold" fill="#334155" letter-spacing="1">EXECUTIVE SUMMARY</text>
    <line x1="0" y1="13" x2="340" y2="13" stroke="#f1f5f9" stroke-width="1"/>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="7.5" fill="#475569">Results-driven PM with 8+ years leading cross-functional software teams, overseeing Agile development,</text>
    <text x="0" y="33" font-family="system-ui, sans-serif" font-size="7.5" fill="#475569">and managing project budget allocations up to $2M. Expert in Scrum, Kanban, and risk mitigation.</text>
  </g>
  
  <!-- Project Experience Timeline -->
  <g transform="translate(30, 155)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7.5" font-weight="bold" fill="#334155" letter-spacing="1">PROJECT DIRECTORY &amp; TIMELINE</text>
    <line x1="0" y1="13" x2="340" y2="13" stroke="#f1f5f9" stroke-width="1"/>
    
    <!-- Timeline Vertical Line -->
    <line x1="10" y1="20" x2="10" y2="105" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="2 1"/>
    
    <!-- Timeline node 1 -->
    <circle cx="10" cy="28" r="3" fill="#334155"/>
    <text x="22" y="31" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Senior Project Manager — Vercel App Router Migration</text>
    <text x="22" y="41" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Completed ahead of schedule. Budget: $1.2M. Managed 15 Engineers.</text>
    
    <!-- Timeline node 2 -->
    <circle cx="10" cy="62" r="3" fill="#475569"/>
    <text x="22" y="65" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Agile Product Delivery Manager — Cloud ERP Integration</text>
    <text x="22" y="75" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Transitioned organization from waterfall to SAFe Scrum. Reduced bug backlog by 35%.</text>
    
    <!-- Timeline node 3 -->
    <circle cx="10" cy="95" r="3" fill="#64748b"/>
    <text x="22" y="98" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Junior Project Coordinator — Global DB Re-indexing</text>
  </g>
</svg>
