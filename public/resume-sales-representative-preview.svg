<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#fff7ed"/>
  <rect x="15" y="15" width="370" height="270" rx="6" fill="#ffffff" stroke="#fed7aa" stroke-width="1.2"/>
  
  <!-- Quota Meter progress bar graphic top right -->
  <g transform="translate(280, 28)">
    <rect x="0" y="5" width="85" height="12" rx="3" fill="#ffedd5" stroke="#fed7aa"/>
    <!-- Fill indicator -->
    <rect x="0" y="5" width="85" height="12" rx="3" fill="#ea580c"/>
    <text x="42.5" y="13.5" font-family="system-ui, sans-serif" font-size="7" font-weight="extrabold" fill="#ffffff" text-anchor="middle">QUOTA MET: 120%</text>
  </g>
  
  <!-- Header Info -->
  <g transform="translate(35, 30)">
    <text x="0" y="12" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#431407">Thomas Stark</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#ea580c">Senior Sales Executive &amp; Pipeline Closer</text>
    <text x="0" y="34" font-family="system-ui, sans-serif" font-size="7.5" fill="#7c2d12">Territory: North America | t.stark@sales-closer.io | Salesforce CRM Certified</text>
  </g>
  
  <line x1="35" y1="74" x2="365" y2="74" stroke="#fed7aa" stroke-width="1.5"/>
  
  <!-- Sales achievements box -->
  <g transform="translate(35, 82)">
    <rect x="0" y="0" width="330" height="38" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ea580c">SALES PIPELINE METRICS:</text>
    <text x="10" y="26" font-family="system-ui, sans-serif" font-size="8" fill="#431407">Average Deal Size: <tspan font-weight="bold">$45,000</tspan> | CRM: <tspan font-weight="bold">Salesforce, HubSpot</tspan> | Closed Deals: <tspan font-weight="bold">40+ Annual</tspan></text>
  </g>
  
  <!-- Core Sales sections -->
  <g transform="translate(35, 132)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#ea580c" letter-spacing="0.5">SALES PROFILE SUMMARY</text>
    <line x1="0" y1="13" x2="330" y2="13" stroke="#fed7aa" stroke-width="1"/>
    <text x="0" y="23" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">High-performing sales executive with 6+ years driving outbound leads, maintaining Salesforce pipeline data,</text>
    <text x="0" y="32" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">closing high-ticket B2B software deals, and consistently exceeding annual quotas by 20% or more.</text>
    
    <text x="0" y="52" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#ea580c" letter-spacing="0.5">PROFESSIONAL SALES EXPERIENCE</text>
    <line x1="0" y1="57" x2="330" y2="57" stroke="#fed7aa" stroke-width="1"/>
    
    <!-- Experience 1 -->
    <text x="0" y="69" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Account Executive Closer — EnterpriseCloud</text>
    <text x="330" y="69" font-family="system-ui, sans-serif" font-size="7" fill="#ea580c" text-anchor="end">2022 - Present</text>
    <text x="0" y="80" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">✦ Handled pipeline negotiations for 50+ enterprise SaaS clients</text>
    <text x="0" y="89" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">✦ Consistently exceeded quarterly sales pipelines targets by 120%</text>
    
    <!-- Experience 2 -->
    <text x="0" y="108" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Outbound Sales Representative — SoftwareLabs</text>
  </g>
</svg>
