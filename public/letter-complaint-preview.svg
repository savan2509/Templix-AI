<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#fff7ed"/>
  <rect x="15" y="15" width="370" height="270" rx="8" fill="#ffffff" stroke="#fed7aa" stroke-width="1.2"/>
  
  <!-- Orange warning banner -->
  <rect x="15" y="15" width="12" height="270" fill="#ea580c" rx="4"/>
  
  <!-- Header Info -->
  <g transform="translate(40, 35)">
    <text x="0" y="12" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#7c2d12">CUSTOMER SERVICE COMPLAINT LETTER</text>
    <text x="0" y="22" font-family="system-ui, sans-serif" font-size="8" fill="#9a3412">Official Transaction Dispute &amp; Desired Resolution Report</text>
  </g>
  
  <line x1="40" y1="64" x2="365" y2="64" stroke="#fed7aa" stroke-width="1"/>
  
  <!-- Customer details -->
  <g transform="translate(40, 76)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ea580c">CUSTOMER NAME:</text>
    <text x="0" y="18" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1c1917">Arthur Jenkins Buyer</text>
    
    <text x="170" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ea580c">ACCOUNT REFERENCE:</text>
    <text x="170" y="18" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1c1917">#AC-908123-X</text>
  </g>
  
  <!-- Dispute details box -->
  <g transform="translate(40, 112)">
    <rect x="0" y="0" width="310" height="52" rx="4" fill="#fff7ed" stroke="#fed7aa" stroke-width="0.75"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ea580c">1. DISPUTED TRANSACTION &amp; ISSUE:</text>
    <text x="10" y="24" font-family="system-ui, sans-serif" font-size="7.5" fill="#1c1917">Product Bought: <tspan font-weight="semibold">Industrial Pump Batch</tspan> | Date: <tspan font-weight="semibold">2026-05-12</tspan></text>
    <text x="10" y="36" font-family="system-ui, sans-serif" font-size="7.5" fill="#1c1917">Dispute Issue: <tspan font-weight="semibold" fill="#dc2626">Pump casing leaked upon installation. Dead on arrival.</tspan></text>
  </g>
  
  <!-- Desired Resolution -->
  <g transform="translate(40, 180)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#ea580c">2. REQUESTED RESOLUTION ACTIONS</text>
    <line x1="0" y1="14" x2="310" y2="14" stroke="#fed7aa" stroke-width="1.5"/>
    
    <text x="0" y="27" font-family="system-ui, sans-serif" font-size="8" fill="#1c1917">Customer Requested Remedy Action</text>
    <text x="310" y="27" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#dc2626" text-anchor="end">Full Product Refund</text>
  </g>
  
  <text x="40" y="272" font-family="system-ui, sans-serif" font-size="7" fill="#fdb874">Please address this dispute filing within 7 business days.</text>
</svg>
