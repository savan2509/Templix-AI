<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#fffbeb"/>
  <rect x="15" y="15" width="370" height="270" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.2"/>
  
  <!-- Quote icon watermark top right -->
  <g transform="translate(325, 30)" fill="#d97706" opacity="0.12">
    <path d="M0 10 L10 10 L5 20 Z M15 10 L25 10 L20 20 Z"/>
  </g>
  
  <!-- Header Info -->
  <g transform="translate(35, 45)">
    <text x="0" y="12" font-family="'Times New Roman', Times, serif" font-size="14" font-weight="bold" fill="#78350f">LETTER OF RECOMMENDATION</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8" fill="#5c3615">Referee Evaluation Statement | Professional Reference Details</text>
  </g>
  
  <line x1="35" y1="74" x2="365" y2="74" stroke="#fde68a" stroke-width="1"/>
  
  <!-- Referee details -->
  <g transform="translate(35, 88)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#d97706">REFEREE/SUPERVISOR:</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1f2937">Dr. Arthur Pendelton</text>
    <text x="0" y="29" font-family="system-ui, sans-serif" font-size="7.5" fill="#5c3615">Dean of Engineering | Vanguard University</text>
    
    <text x="180" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#d97706">APPLICANT INDIVIDUAL:</text>
    <text x="180" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1f2937">Sarah Jenkins Student</text>
    <text x="180" y="29" font-family="system-ui, sans-serif" font-size="7.5" fill="#5c3615">Relationship Period: 18 Months</text>
  </g>
  
  <!-- Reference strengths checklists -->
  <g transform="translate(35, 138)">
    <rect x="0" y="0" width="330" height="42" rx="4" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#d97706">NOTABLE CANDIDATE STRENGTHS:</text>
    <text x="10" y="26" font-family="system-ui, sans-serif" font-size="8" fill="#1f2937">Strengths: <tspan font-weight="bold">Technical architecture, clean code, rapid prototyping</tspan></text>
  </g>
  
  <!-- Evaluation context -->
  <g transform="translate(35, 198)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#d97706">RECOMMENDATION OPPORTUNITY:</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="8" fill="#4b5563">"Highly recommended for the Senior Software Architect post at cloud organizations."</text>
    <rect x="0" y="26" width="330" height="3" rx="1.5" fill="#fef3c7"/>
  </g>
  
  <text x="35" y="272" font-family="system-ui, sans-serif" font-size="7.5" fill="#b45309">Please contact the referee office for direct academic credential verification.</text>
</svg>
