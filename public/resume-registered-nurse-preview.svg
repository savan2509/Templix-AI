<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#f0fdf4"/>
  <rect x="15" y="15" width="370" height="270" rx="4" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.2"/>
  
  <!-- Hospital medical green top header bar -->
  <rect x="15" y="15" width="370" height="42" rx="4" fill="#059669"/>
  <!-- Medical red cross line symbol decoration -->
  <path d="M350 26 L356 26 L356 20 L360 20 L360 26 L366 26 L366 30 L360 30 L360 36 L356 36 L356 30 L350 30 Z" fill="#ffffff"/>
  
  <!-- Nurse Name header -->
  <text x="35" y="32" font-family="system-ui, sans-serif" font-size="12.5" font-weight="bold" fill="#ffffff">EMILY STEVENS, BSN, RN</text>
  <text x="35" y="44" font-family="system-ui, sans-serif" font-size="7.5" font-weight="semibold" fill="#a7f3d0">REGISTERED NURSE — LIC #RN-938201 (ACTIVE)</text>
  
  <!-- Left Side: Clinical certifications / locations -->
  <g transform="translate(35, 75)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#059669" letter-spacing="0.5">CLINICAL COMPETENCIES</text>
    
    <rect x="0" y="16" width="100" height="12" rx="2" fill="#059669" opacity="0.08"/>
    <text x="6" y="24" font-family="system-ui, sans-serif" font-size="7" font-weight="semibold" fill="#047857">ER Triage &amp; Trauma Care</text>
    
    <rect x="0" y="32" width="100" height="12" rx="2" fill="#059669" opacity="0.08"/>
    <text x="6" y="40" font-family="system-ui, sans-serif" font-size="7" font-weight="semibold" fill="#047857">Pediatric ICU support</text>
    
    <rect x="0" y="48" width="100" height="12" rx="2" fill="#059669" opacity="0.08"/>
    <text x="6" y="56" font-family="system-ui, sans-serif" font-size="7" font-weight="semibold" fill="#047857">Medication Administration</text>
    
    <rect x="0" y="64" width="100" height="12" rx="2" fill="#059669" opacity="0.08"/>
    <text x="6" y="72" font-family="system-ui, sans-serif" font-size="7" font-weight="semibold" fill="#047857">EHR &amp; Patient Advocacy</text>
    
    <!-- Emergency details block -->
    <rect x="0" y="88" width="110" height="78" rx="4" fill="#f0fdf4" stroke="#a7f3d0" stroke-width="0.75"/>
    <text x="10" y="101" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#059669">CREDENTIALS</text>
    <text x="10" y="113" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">✦ CPR Certified: YES</text>
    <text x="10" y="125" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">✦ BLS &amp; ACLS active</text>
    <text x="10" y="137" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">✦ BSN Degree (2020)</text>
    <text x="10" y="149" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">✦ Target: City Hospital</text>
  </g>
  
  <line x1="165" y1="75" x2="165" y2="265" stroke="#a7f3d0" stroke-width="1"/>
  
  <!-- Right Side: Nursing summary & Hospital experience -->
  <g transform="translate(180, 75)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#059669" letter-spacing="0.5">NURSING STATEMENT</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">Dedicated Registered Nurse (RN) BSN with 5+ years</text>
    <text x="0" y="28" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">clinical rotations. Expert in critical ER triage, ICU bedside care,</text>
    <text x="0" y="37" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">patient charting, and medication safety systems.</text>
    
    <text x="0" y="58" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#059669" letter-spacing="0.5">CLINICAL ROTATIONS HISTORY</text>
    <line x1="0" y1="64" x2="185" y2="64" stroke="#a7f3d0" stroke-width="1"/>
    
    <!-- Rotation 1 -->
    <text x="0" y="76" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Emergency Room Nurse — St. Jude Clinic</text>
    <text x="0" y="86" font-family="system-ui, sans-serif" font-size="7.5" fill="#059669">2022 - Present</text>
    <!-- Bullet points -->
    <circle cx="3" cy="97" r="1.5" fill="#059669"/>
    <text x="10" y="100" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Managed ER triage flow for 40+ acute care patients daily</text>
    <circle cx="3" cy="107" r="1.5" fill="#059669"/>
    <text x="10" y="110" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Assisted ER physicians in critical code resuscitation</text>
    
    <!-- Rotation 2 -->
    <text x="0" y="130" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Pediatric ICU Bedside RN — General Hospital</text>
    <text x="0" y="140" font-family="system-ui, sans-serif" font-size="7.5" fill="#059669">2020 - 2022</text>
    <circle cx="3" cy="151" r="1.5" fill="#059669"/>
    <text x="10" y="154" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Administered IV therapy under high compliance guidelines</text>
  </g>
</svg>
