<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#fff7ed"/>
  <rect x="15" y="15" width="370" height="270" rx="4" fill="#ffffff" stroke="#fed7aa" stroke-width="1.2"/>
  
  <!-- Delivery truck icon watermark top right -->
  <g transform="translate(320, 28)" fill="none" stroke="#ea580c" stroke-width="1.2" opacity="0.12">
    <rect x="0" y="8" width="22" height="15" rx="1"/>
    <rect x="22" y="11" width="10" height="12" rx="1"/>
    <circle cx="6" cy="25" r="3" fill="#ea580c"/>
    <circle cx="20" cy="25" r="3" fill="#ea580c"/>
  </g>
  
  <!-- Header Info -->
  <g transform="translate(35, 45)">
    <text x="0" y="12" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#7c2d12">COMMERCIAL SALES CONTRACT</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8" fill="#9a3412">Bill of Sale | Goods Purchase Specifications &amp; Liability Clauses</text>
  </g>
  
  <line x1="35" y1="74" x2="365" y2="74" stroke="#fed7aa" stroke-width="1"/>
  
  <!-- Seller and Buyer details -->
  <g transform="translate(35, 88)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ea580c">COMMERCIAL SELLER:</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#431407">Superior Supply Distributors</text>
    
    <text x="180" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ea580c">COMMERCIAL BUYER:</text>
    <text x="180" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#431407">John Doe Logistics LLC</text>
  </g>
  
  <!-- Goods details -->
  <g transform="translate(35, 128)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#ea580c">GOODS ACQUISITION DETAILS:</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#18181b">Industrial Hardware Batch (Model #IH-9302-X)</text>
  </g>
  
  <!-- Transaction Cost & Delivery details -->
  <g transform="translate(35, 162)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#ea580c">GOODS COST &amp; SHIPPING GUARANTEES</text>
    <line x1="0" y1="14" x2="330" y2="14" stroke="#ffedd5" stroke-width="1.5"/>
    
    <text x="0" y="27" font-family="system-ui, sans-serif" font-size="8" fill="#18181b">Transaction Total Goods Cost</text>
    <text x="330" y="27" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#18181b" text-anchor="end">$15,500.00</text>
    <line x1="0" y1="35" x2="330" y2="35" stroke="#fff7ed" stroke-width="1"/>
    
    <text x="0" y="47" font-family="system-ui, sans-serif" font-size="8" fill="#18181b">Shipping Method | Warranty Period</text>
    <text x="330" y="47" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#ea580c" text-anchor="end">FOB Shipping Point | 12 Months</text>
  </g>
  
  <text x="35" y="272" font-family="system-ui, sans-serif" font-size="7" fill="#fdba74">Risk of Loss transfers upon delivery to shipper. Governed under UCC guidelines.</text>
</svg>
