<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#eff6ff"/>
  <rect x="15" y="15" width="370" height="270" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  
  <!-- Navy header bar background -->
  <rect x="15" y="15" width="370" height="42" rx="4" fill="#2563eb"/>
  
  <!-- Header Info -->
  <text x="35" y="38" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">EMPLOYMENT OFFER LETTER</text>
  <text x="35" y="49" font-family="system-ui, sans-serif" font-size="7.5" fill="#dbeafe">Official Job Proposal | Vanguard Corporation LLC</text>
  
  <!-- Candidate details -->
  <g transform="translate(35, 75)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#2563eb">PROPOSED CANDIDATE:</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1e293b">Jane Doe Engineer</text>
    
    <text x="180" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#2563eb">JOB TITLE PROPOSED:</text>
    <text x="180" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1e293b">Lead Developer (Frontend)</text>
  </g>
  
  <line x1="35" y1="112" x2="365" y2="112" stroke="#bfdbfe" stroke-width="1"/>
  
  <!-- Welcome paragraph representation -->
  <g transform="translate(35, 122)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">"We are excited to offer you a position at our corporate technical teams."</text>
    <rect x="0" y="15" width="330" height="4" rx="2" fill="#f1f5f9"/>
    <rect x="0" y="23" width="290" height="4" rx="2" fill="#f1f5f9"/>
  </g>
  
  <!-- Compensation structures table details -->
  <g transform="translate(35, 162)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#2563eb">PROPOSED COMPENSATIONS &amp; START DATE</text>
    <line x1="0" y1="14" x2="330" y2="14" stroke="#bfdbfe" stroke-width="1.5"/>
    
    <text x="0" y="27" font-family="system-ui, sans-serif" font-size="8" fill="#1c1917">Monthly Base Compensation Package</text>
    <text x="330" y="27" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1c1917" text-anchor="end">$9,500.00/mo</text>
    <line x1="0" y1="35" x2="330" y2="35" stroke="#f1f5f9" stroke-width="1"/>
    
    <text x="0" y="47" font-family="system-ui, sans-serif" font-size="8" fill="#1c1917">Formal Start Date | Acceptance Deadline</text>
    <text x="330" y="47" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#2563eb" text-anchor="end">2026-07-15 | 2026-07-05</text>
  </g>
  
  <text x="35" y="272" font-family="system-ui, sans-serif" font-size="7" fill="#93c5fd">This job offer is subject to standard reference verifications.</text>
</svg>
