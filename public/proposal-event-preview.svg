<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#fff5f7"/>
  <rect x="15" y="15" width="370" height="270" rx="12" fill="#ffffff" stroke="#fbcfe8" stroke-width="1.2"/>
  
  <!-- Right column circles representation (Event layout) -->
  <g transform="translate(325, 30)" fill="none" stroke="#db2777" stroke-width="1.2" opacity="0.3">
    <!-- Concentric dinner table seating representation -->
    <circle cx="20" cy="20" r="16"/>
    <circle cx="5" cy="20" r="2.5" fill="#db2777"/>
    <circle cx="35" cy="20" r="2.5" fill="#db2777"/>
    <circle cx="20" cy="5" r="2.5" fill="#db2777"/>
    <circle cx="20" cy="35" r="2.5" fill="#db2777"/>
  </g>
  
  <!-- Header Info -->
  <g transform="translate(35, 45)">
    <text x="0" y="12" font-family="'Georgia', serif" font-weight="bold" font-size="14" fill="#db2777">EVENT PLANNING &amp; DESIGN PROPOSAL</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="7.5" fill="#9ca3af">Creative Event Logistics | Venue Seating, Decor Theme &amp; Catering Budget</text>
  </g>
  
  <line x1="35" y1="74" x2="365" y2="74" stroke="#fbcfe8" stroke-width="1"/>
  
  <!-- Event client & venue details -->
  <g transform="translate(35, 88)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#db2777">EVENT CLIENT PARTNER:</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1f2937">Apex Corporate Gala</text>
    
    <text x="180" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#db2777">PROPOSED VENUE:</text>
    <text x="180" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1f2937">Sunset Garden Hall</text>
  </g>
  
  <!-- Guest capacity box -->
  <g transform="translate(35, 128)">
    <rect x="0" y="0" width="330" height="42" rx="4" fill="#fff5f7" stroke="#fbcfe8" stroke-width="0.75"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7.5" font-weight="bold" fill="#db2777">GUEST CAPACITY &amp; CATERING DETAILS:</text>
    <text x="10" y="26" font-family="system-ui, sans-serif" font-size="8" fill="#1e293b">Guest Capacity: <tspan font-weight="bold">250 Guests</tspan> | Catering: <tspan font-weight="bold">Premium Buffet &amp; Open Bar</tspan> | Theme: <tspan font-weight="bold">Golden Era</tspan></text>
  </g>
  
  <!-- Budget cost -->
  <g transform="translate(35, 182)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#db2777">ESTIMATED COORDINATION &amp; EVENTS BUDGET</text>
    <line x1="0" y1="14" x2="330" y2="14" stroke="#fbcfe8" stroke-width="1.5"/>
    
    <text x="0" y="27" font-family="system-ui, sans-serif" font-size="8" fill="#18181b">Venue Rental &amp; Event Coordination Fees</text>
    <text x="330" y="27" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#18181b" text-anchor="end">$8,500.00</text>
    <line x1="0" y1="35" x2="330" y2="35" stroke="#fafafa" stroke-width="1"/>
    
    <text x="0" y="47" font-family="system-ui, sans-serif" font-size="8" fill="#18181b">Total Catering, Bar Services &amp; Decor Budget</text>
    <text x="330" y="47" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#db2777" text-anchor="end">$14,000.00</text>
  </g>
  
  <text x="35" y="272" font-family="system-ui, sans-serif" font-size="7.5" fill="#fca5a5">Initial venue reservation deposits required to hold booking dates details.</text>
</svg>
