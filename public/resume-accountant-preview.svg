<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#eff6ff"/>
  <rect x="15" y="15" width="370" height="270" rx="4" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  
  <!-- Classic accounting double underline accent decoration top right -->
  <line x1="300" y1="35" x2="365" y2="35" stroke="#2563eb" stroke-width="1"/>
  <line x1="300" y1="38" x2="365" y2="38" stroke="#2563eb" stroke-width="1"/>
  <text x="365" y="48" font-family="'Courier New', Courier, monospace" font-size="7.5" font-weight="bold" fill="#2563eb" text-anchor="end">AUDIT STATUS: CPA ACTIVE</text>
  
  <!-- Header Info -->
  <g transform="translate(35, 30)">
    <text x="0" y="12" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e3a8a">Marcus Jenkins, CPA</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#2563eb">Senior Accountant &amp; Financial Auditor</text>
    <text x="0" y="34" font-family="system-ui, sans-serif" font-size="7.5" fill="#475569">CPA License #: #CPA-902381-NY | Email: marcus@jenkins-cpa.com</text>
  </g>
  
  <line x1="35" y1="74" x2="365" y2="74" stroke="#dbeafe" stroke-width="1.5"/>
  
  <!-- Accounting tools and ledgers display box -->
  <g transform="translate(35, 82)">
    <rect x="0" y="0" width="330" height="38" rx="3" fill="#f8fafc" stroke="#dbeafe" stroke-width="1"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#2563eb">ACCOUNTING SYSTEMS &amp; STANDARDS:</text>
    <text x="10" y="26" font-family="system-ui, sans-serif" font-size="8" fill="#1e293b">Ledgers: <tspan font-weight="bold">QuickBooks, Xero, ERP Oracle</tspan> | Standards: <tspan font-weight="bold">GAAP Compliance, Audits</tspan></text>
  </g>
  
  <!-- Core Accountant Details -->
  <g transform="translate(35, 132)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#2563eb" letter-spacing="0.5">FINANCIAL PROFILE SUMMARY</text>
    <line x1="0" y1="13" x2="330" y2="13" stroke="#dbeafe" stroke-width="1"/>
    <text x="0" y="23" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Certified Public Accountant (CPA) with 7+ years managing corporate taxes, conducting internal audits,</text>
    <text x="0" y="32" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">maintaining general ledgers under GAAP guidelines, and optimizing financial reporting workflows.</text>
    
    <text x="0" y="52" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#2563eb" letter-spacing="0.5">PROFESSIONAL ACCOUNTING HISTORY</text>
    <line x1="0" y1="57" x2="330" y2="57" stroke="#dbeafe" stroke-width="1"/>
    
    <!-- Experience 1 -->
    <text x="0" y="69" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Senior Corporate Accountant — Vanguard Finance</text>
    <text x="330" y="69" font-family="system-ui, sans-serif" font-size="7" fill="#2563eb" text-anchor="end">2022 - Present</text>
    <text x="0" y="80" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">✦ Managed General Ledger reports for $10M+ annual revenue entities</text>
    <text x="0" y="89" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">✦ Coordinated corporate tax compliance audits with IRS representatives</text>
    
    <!-- Experience 2 -->
    <text x="0" y="108" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#1e293b">Audit Associate — Deloitte &amp; Touche</text>
  </g>
</svg>
