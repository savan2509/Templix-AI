<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Creative pinkish-violet canvas background -->
  <rect width="100%" height="100%" fill="#fff5f7"/>
  <rect x="15" y="15" width="370" height="270" rx="16" fill="#ffffff" stroke="#fce7f3" stroke-width="1.5"/>
  
  <!-- Abstract Design Graphic top right -->
  <path d="M385 15 L330 15 L385 70 Z" fill="#db2777" opacity="0.15"/>
  <path d="M385 70 L300 15 L320 15 L385 50 Z" fill="#db2777" opacity="0.08"/>
  
  <!-- Creative Profile Header -->
  <g transform="translate(35, 35)">
    <!-- Initials Avatar Frame -->
    <rect x="0" y="0" width="32" height="32" rx="8" fill="#db2777"/>
    <text x="16" y="21" font-family="'Georgia', serif" font-weight="bold" font-size="14" fill="#ffffff" text-anchor="middle">D</text>
    
    <!-- Title details -->
    <text x="42" y="13" font-family="'Georgia', serif" font-weight="bold" font-size="13" fill="#0f172a">Dianne Vance</text>
    <text x="42" y="25" font-family="system-ui, sans-serif" font-weight="bold" font-size="8" fill="#db2777">Art Director &amp; Visual UI Designer</text>
    <text x="42" y="34" font-family="system-ui, sans-serif" font-size="7" fill="#9ca3af">portfolio: dianne-design.co | behance: behance.net/diannev</text>
  </g>
  
  <line x1="35" y1="82" x2="365" y2="82" stroke="#fbcfe8" stroke-width="1"/>
  
  <!-- Two columns layout -->
  <!-- Left Side: Design Software Skills (pink dots indicator) -->
  <g transform="translate(35, 95)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#db2777" letter-spacing="0.5">DESIGN TOOLKIT</text>
    
    <!-- Skill 1 -->
    <text x="0" y="22" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Adobe Photoshop</text>
    <circle cx="85" cy="20" r="2.5" fill="#db2777"/>
    <circle cx="93" cy="20" r="2.5" fill="#db2777"/>
    <circle cx="101" cy="20" r="2.5" fill="#db2777"/>
    <circle cx="109" cy="20" r="2.5" fill="#db2777"/>
    <circle cx="117" cy="20" r="2.5" fill="#db2777" opacity="0.2"/>
    
    <!-- Skill 2 -->
    <text x="0" y="36" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Adobe Illustrator</text>
    <circle cx="85" cy="34" r="2.5" fill="#db2777"/>
    <circle cx="93" cy="34" r="2.5" fill="#db2777"/>
    <circle cx="101" cy="34" r="2.5" fill="#db2777"/>
    <circle cx="109" cy="34" r="2.5" fill="#db2777"/>
    <circle cx="117" cy="34" r="2.5" fill="#db2777"/>
    
    <!-- Skill 3 -->
    <text x="0" y="50" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Figma (UI Design)</text>
    <circle cx="85" cy="48" r="2.5" fill="#db2777"/>
    <circle cx="93" cy="48" r="2.5" fill="#db2777"/>
    <circle cx="101" cy="48" r="2.5" fill="#db2777"/>
    <circle cx="109" cy="48" r="2.5" fill="#db2777"/>
    <circle cx="117" cy="48" r="2.5" fill="#db2777" opacity="0.2"/>
    
    <!-- Skill 4 -->
    <text x="0" y="64" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Adobe InDesign</text>
    <circle cx="85" cy="62" r="2.5" fill="#db2777"/>
    <circle cx="93" cy="62" r="2.5" fill="#db2777"/>
    <circle cx="101" cy="62" r="2.5" fill="#db2777"/>
    <circle cx="109" cy="62" r="2.5" fill="#db2777" opacity="0.2"/>
    <circle cx="117" cy="62" r="2.5" fill="#db2777" opacity="0.2"/>
    
    <!-- Design Specialties block -->
    <rect x="0" y="80" width="125" height="85" rx="8" fill="#fff5f7" stroke="#fce7f3" stroke-width="1"/>
    <text x="10" y="93" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#db2777">SPECIALTIES</text>
    <text x="10" y="107" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">✦ Brand Identity systems</text>
    <text x="10" y="120" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">✦ Vector illustration</text>
    <text x="10" y="133" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">✦ Mobile UI prototyping</text>
    <text x="10" y="146" font-family="system-ui, sans-serif" font-size="7.5" fill="#374151">✦ Print publication layouts</text>
  </g>
  
  <line x1="175" y1="95" x2="175" y2="265" stroke="#fce7f3" stroke-width="1"/>
  
  <!-- Right Side: Profile Summary & Exp -->
  <g transform="translate(190, 95)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#db2777" letter-spacing="0.5">CREATIVE VISION</text>
    <text x="0" y="20" font-family="'Georgia', serif" font-size="7.5" fill="#4b5563" font-style="italic">"Passionate visual designer focused on constructing cohesive brand</text>
    <text x="0" y="29" font-family="'Georgia', serif" font-size="7.5" fill="#4b5563" font-style="italic">identities and dynamic vector illustrations that increase user trust."</text>
    
    <text x="0" y="52" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#db2777" letter-spacing="0.5">EXPERT EXPERIENCE</text>
    <line x1="0" y1="58" x2="175" y2="58" stroke="#fce7f3" stroke-width="1"/>
    
    <!-- Job 1 -->
    <text x="0" y="70" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#0f172a">Senior Graphic Lead — Pixel Agency</text>
    <text x="0" y="80" font-family="system-ui, sans-serif" font-size="7" fill="#db2777">2023 - Present</text>
    <text x="0" y="91" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Managed redesign of 12+ corporate client brand assets.</text>
    
    <!-- Job 2 -->
    <text x="0" y="112" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#0f172a">Visual UI Designer — CreativeLab</text>
    <text x="0" y="122" font-family="system-ui, sans-serif" font-size="7" fill="#db2777">2020 - 2023</text>
    <text x="0" y="133" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Built interactive mobile UI prototypes using figma.</text>
  </g>
</svg>
