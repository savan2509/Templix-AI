<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#fef2f2"/>
  <!-- High Security warning border -->
  <rect x="15" y="15" width="370" height="270" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="1.8"/>
  <rect x="20" y="20" width="360" height="260" rx="2" fill="none" stroke="#fca5a5" stroke-width="0.5"/>
  
  <!-- Padlock graphic icon in top right background -->
  <g transform="translate(325, 28)" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.15">
    <rect x="0" y="10" width="28" height="20" rx="4"/>
    <path d="M6 10 C6 2 22 2 22 10" stroke-linecap="round"/>
    <circle cx="14" cy="20" r="2.5" fill="#ef4444"/>
  </g>
  
  <!-- Header Info -->
  <g transform="translate(35, 45)">
    <text x="0" y="12" font-family="Impact, Charcoal, sans-serif" font-size="15" fill="#dc2626" letter-spacing="1">MUTUAL NON-DISCLOSURE AGREEMENT</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8" fill="#4b5563">High Security NDA | Confidential Proprietary Data Protection</text>
  </g>
  
  <line x1="35" y1="80" x2="365" y2="80" stroke="#fca5a5" stroke-width="1"/>
  
  <!-- Parties Details -->
  <g transform="translate(35, 93)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#dc2626">DISCLOSING PARTY:</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1f2937">Vanguard Corporation Inc</text>
    
    <text x="180" y="8" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#dc2626">RECEIVING PARTY:</text>
    <text x="180" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#1f2937">John Doe Representative</text>
  </g>
  
  <!-- Warning callout block -->
  <g transform="translate(35, 130)">
    <rect x="0" y="0" width="330" height="42" rx="4" fill="#fff5f5" stroke="#fee2e2" stroke-width="1"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#dc2626">WARNING: CONFIDENTIALITY OBLIGATIONS</text>
    <text x="10" y="25" font-family="system-ui, sans-serif" font-size="7.5" fill="#475569" font-style="italic">"The receiving party agrees to hold all databases, software architectures,</text>
    <text x="10" y="33" font-family="system-ui, sans-serif" font-size="7.5" fill="#475569" font-style="italic">and marketing schemas strictly confidential for the duration of 5 Years."</text>
  </g>
  
  <!-- Legal details -->
  <g transform="translate(35, 185)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#dc2626">1. DEFINITION OF PROTECTED INFORMATION</text>
    <rect x="0" y="14" width="330" height="4" rx="2" fill="#fee2e2"/>
    <rect x="0" y="22" width="300" height="4" rx="2" fill="#fafafa"/>
    
    <text x="0" y="42" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#dc2626">2. PURPOSE OF DISCLOSURE &amp; SHARING</text>
    <text x="0" y="53" font-family="system-ui, sans-serif" font-size="8" fill="#1e293b">Sharing Purpose: <tspan font-weight="bold">Product partnership and tech evaluations.</tspan></text>
  </g>
  
  <text x="35" y="272" font-family="system-ui, sans-serif" font-size="7" fill="#9ca3af">Notice: Obligations survive NDA expiration. Legal penalties apply for breaches.</text>
</svg>
