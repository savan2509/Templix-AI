<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0f172a"/>
  <rect x="15" y="15" width="370" height="270" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  
  <!-- System Architecture block connection watermark -->
  <g transform="translate(300, 32)" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.3">
    <!-- Server boxes -->
    <rect x="10" y="0" width="20" height="10" rx="1"/>
    <rect x="0" y="20" width="15" height="10" rx="1"/>
    <rect x="25" y="20" width="15" height="10" rx="1"/>
    <!-- Connect lines -->
    <path d="M20 10 L20 15 L7 15 L7 20 M20 15 L32 15 L32 20"/>
  </g>
  
  <!-- Header Info -->
  <g transform="translate(35, 45)">
    <text x="0" y="12" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" fill="#38bdf8">SOFTWARE ENGINEERING PROPOSAL</text>
    <text x="0" y="24" font-family="system-ui, sans-serif" font-size="8" fill="#94a3b8">Cloud Architecture Bid | Development Stack &amp; Sprint Delivery Budget</text>
  </g>
  
  <line x1="35" y1="74" x2="365" y2="74" stroke="#334155" stroke-width="1"/>
  
  <!-- Tech details block -->
  <g transform="translate(35, 88)">
    <text x="0" y="8" font-family="'Courier New', Courier, monospace" font-size="7" font-weight="bold" fill="#38bdf8">1. SYSTEM STACK &amp; DATABASE:</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#e2e8f0">Stack: Next.js 16 (App Router), PostgreSQL, Vercel Serverless</text>
    <text x="0" y="29" font-family="system-ui, sans-serif" font-size="7.5" fill="#94a3b8">Includes core module databases, dashboard UI, and stripe checkout hook.</text>
  </g>
  
  <!-- Sprint duration box -->
  <g transform="translate(35, 128)">
    <rect x="0" y="0" width="330" height="38" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="10" y="12" font-family="system-ui, sans-serif" font-size="7.5" font-weight="bold" fill="#38bdf8">SPRINTS &amp; DURATION LIFECYCLE:</text>
    <text x="10" y="26" font-family="system-ui, sans-serif" font-size="8" fill="#e2e8f0">Sprint Cycles: <tspan font-weight="bold">6 Sprints (12 Weeks)</tspan> | Integration Scope: <tspan font-weight="bold">Auth, Stripe, API hooks</tspan></text>
  </g>
  
  <!-- Engineering Budget -->
  <g transform="translate(35, 182)">
    <text x="0" y="8" font-family="'Courier New', Courier, monospace" font-size="8.5" font-weight="bold" fill="#38bdf8">const engineeringBudget = {</text>
    
    <text x="15" y="20" font-family="'Courier New', Courier, monospace" font-size="8" fill="#e2e8f0">totalDeveloperHours: <tspan fill="#f59e0b">"240 Hours"</tspan>,</text>
    <text x="15" y="31" font-family="'Courier New', Courier, monospace" font-size="8" fill="#e2e8f0">customAPIIntegrations: <tspan fill="#f59e0b">"Included"</tspan>,</text>
    <text x="15" y="42" font-family="'Courier New', Courier, monospace" font-size="8" fill="#e2e8f0">grandTotalCosts: <tspan fill="#10b981">"$18,500.00"</tspan></text>
    
    <text x="0" y="54" font-family="'Courier New', Courier, monospace" font-size="8.5" font-weight="bold" fill="#38bdf8">};</text>
  </g>
  
  <text x="35" y="272" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Includes 60 days post-launch serverless cloud monitoring and support.</text>
</svg>
