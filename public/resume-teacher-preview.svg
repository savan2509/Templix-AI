<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#fffbeb"/>
  <!-- Ruled notebook sheet aesthetic card border -->
  <rect x="15" y="15" width="370" height="270" rx="6" fill="#ffffff" stroke="#fcd34d" stroke-width="1.2"/>
  
  <!-- Horizontal notebook lines decoration inside card (very subtle) -->
  <line x1="20" y1="80" x2="380" y2="80" stroke="#fef3c7" stroke-width="1"/>
  <line x1="20" y1="110" x2="380" y2="110" stroke="#fef3c7" stroke-width="1"/>
  <line x1="20" y1="140" x2="380" y2="140" stroke="#fef3c7" stroke-width="1"/>
  <line x1="20" y1="170" x2="380" y2="170" stroke="#fef3c7" stroke-width="1"/>
  <line x1="20" y1="200" x2="380" y2="200" stroke="#fef3c7" stroke-width="1"/>
  <line x1="20" y1="230" x2="380" y2="230" stroke="#fef3c7" stroke-width="1"/>
  
  <!-- Left margins vertical teacher grading red line -->
  <line x1="50" y1="15" x2="50" y2="285" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3 1"/>
  
  <!-- Header Info -->
  <text x="65" y="45" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" fill="#b45309">AMANDA GREEN, M.Ed.</text>
  <text x="65" y="57" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#78350f">Licensed Elementary School Teacher</text>
  <text x="65" y="67" font-family="system-ui, sans-serif" font-size="7" fill="#92400e">License ID: #LIC-ED-9012 | Email: amanda@edu-teach.org</text>
  
  <line x1="65" y1="74" x2="365" y2="74" stroke="#fcd34d" stroke-width="1.5"/>
  
  <!-- Educational Specialties & Grades -->
  <g transform="translate(65, 82)">
    <text x="0" y="8" font-family="system-ui, sans-serif" font-size="7.5" font-weight="bold" fill="#b45309" letter-spacing="0.5">TEACHING CREDENTIALS &amp; LICENSES</text>
    <text x="0" y="19" font-family="system-ui, sans-serif" font-size="8" fill="#18181b">Subject Specialty: English Literature &amp; ESL | Grade Level: 3rd - 5th Grade</text>
    <text x="0" y="28" font-family="system-ui, sans-serif" font-size="7.5" fill="#4b5563">Pedagogical Methods: Inquiry-based Lesson Plans, Remote e-Learning, ESL support</text>
    
    <text x="0" y="48" font-family="system-ui, sans-serif" font-size="7.5" font-weight="bold" fill="#b45309" letter-spacing="0.5">EDUCATIONAL PHILOSOPHY</text>
    <line x1="0" y1="53" x2="300" y2="53" stroke="#fef3c7" stroke-width="1"/>
    <text x="0" y="64" font-family="system-ui, sans-serif" font-size="7.5" fill="#475569">"To cultivate curious, life-long learners by building classroom environments</text>
    <text x="0" y="73" font-family="system-ui, sans-serif" font-size="7.5" fill="#475569">that support differentiated instruction and parent-teacher communication loops."</text>
    
    <text x="0" y="94" font-family="system-ui, sans-serif" font-size="7.5" font-weight="bold" fill="#b45309" letter-spacing="0.5">TEACHING PRACTICE &amp; CLASSROOMS</text>
    <line x1="0" y1="99" x2="300" y2="99" stroke="#fef3c7" stroke-width="1"/>
    
    <!-- School 1 -->
    <text x="0" y="111" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#18181b">4th Grade Class Teacher — Oakwood Elementary</text>
    <text x="300" y="111" font-family="system-ui, sans-serif" font-size="7.5" fill="#92400e" text-anchor="end">2022 - Pres</text>
    <!-- Little apple or bullet indicators -->
    <text x="0" y="122" font-family="system-ui, sans-serif" font-size="7.5" fill="#475569">✦ Designed weekly inquiry-based reading workshops for 24+ learners</text>
    <text x="0" y="131" font-family="system-ui, sans-serif" font-size="7.5" fill="#475569">✦ Coordinated remote student reading panels using Google Classrooms</text>
    
    <!-- School 2 -->
    <text x="0" y="150" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#18181b">3rd Grade Co-Teacher — Lincoln School</text>
    <text x="300" y="150" font-family="system-ui, sans-serif" font-size="7.5" fill="#92400e" text-anchor="end">2020 - 2022</text>
    <text x="0" y="161" font-family="system-ui, sans-serif" font-size="7.5" fill="#475569">✦ Implemented individualized ESL support plans increasing test metrics by 15%</text>
  </g>
</svg>
