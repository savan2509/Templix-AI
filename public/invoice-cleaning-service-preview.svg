<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#f0f9ff"/>
  <rect x="20" y="20" width="360" height="260" rx="12" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
  
  <!-- Bubble decoration graphics -->
  <circle cx="340" cy="50" r="15" fill="#38bdf8" opacity="0.1"/>
  <circle cx="355" cy="70" r="8" fill="#0284c7" opacity="0.08"/>
  <circle cx="330" cy="75" r="5" fill="#0284c7" opacity="0.12"/>
  
  <!-- Sparkle details -->
  <path d="M48 38 L51 44 L57 47 L51 50 L48 56 L45 50 L39 47 L45 44 Z" fill="#0284c7" opacity="0.7"/>
  
  <!-- Title / Logo Header -->
  <text x="65" y="46" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0369a1">SPARKLE &amp; SHINE CLEANERS</text>
  <text x="65" y="57" font-family="system-ui, sans-serif" font-size="7.5" fill="#64748b">Premium Domestic &amp; Office Janitorial</text>
  
  <!-- Right reference info -->
  <text x="310" y="43" font-family="system-ui, sans-serif" font-weight="bold" font-size="10" fill="#0284c7" text-anchor="end">JANITORIAL RECEIPT</text>
  <text x="310" y="54" font-family="system-ui, sans-serif" font-size="7.5" fill="#94a3b8" text-anchor="end">Ref: #INV-CL-2918</text>
  
  <line x1="40" y1="72" x2="340" y2="72" stroke="#e0f2fe" stroke-width="1"/>
  
  <!-- Client Detail Box -->
  <g transform="translate(40, 80)">
    <text x="0" y="11" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#0284c7">CLEANING ADDRESS:</text>
    <text x="0" y="22" font-family="system-ui, sans-serif" font-size="8.5" font-weight="bold" fill="#0f172a">104 Oakwood Villa, Apt 2B, USA</text>
    <text x="0" y="32" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Service Frequency: Monthly Deep Clean</text>
  </g>
  
  <!-- Checklist layout -->
  <g transform="translate(40, 125)">
    <rect x="0" y="0" width="300" height="42" rx="6" fill="#f8fafc" stroke="#f1f5f9"/>
    <text x="10" y="15" font-family="system-ui, sans-serif" font-size="7.5" font-weight="bold" fill="#475569">COMPLETED CHECKLIST:</text>
    
    <!-- Checklist items simulated -->
    <text x="10" y="31" font-family="system-ui, sans-serif" font-size="8" fill="#10b981">✔ Kitchen deep clean</text>
    <text x="110" y="31" font-family="system-ui, sans-serif" font-size="8" fill="#10b981">✔ 3 Bathrooms sanitized</text>
    <text x="220" y="31" font-family="system-ui, sans-serif" font-size="8" fill="#10b981">✔ Carpet steam</text>
  </g>
  
  <!-- Services Item Table list -->
  <text x="40" y="185" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#0284c7">CLEANING SERVICES INVOICED</text>
  <text x="340" y="185" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#0284c7" text-anchor="end">TOTAL</text>
  <line x1="40" y1="191" x2="340" y2="191" stroke="#e0f2fe" stroke-width="1.5"/>
  
  <text x="40" y="206" font-family="system-ui, sans-serif" font-size="8" fill="#334155">Base Residential Cleaning Services (8 Rooms)</text>
  <text x="340" y="206" font-family="system-ui, sans-serif" font-size="8" font-weight="semibold" fill="#334155" text-anchor="end">$280.00</text>
  <line x1="40" y1="213" x2="340" y2="213" stroke="#f8fafc" stroke-width="1"/>
  
  <text x="40" y="226" font-family="system-ui, sans-serif" font-size="8" fill="#334155">Sanitization &amp; Environmental Supplies Surcharge</text>
  <text x="340" y="226" font-family="system-ui, sans-serif" font-size="8" font-weight="semibold" fill="#334155" text-anchor="end">$45.00</text>
  
  <line x1="40" y1="236" x2="340" y2="236" stroke="#0284c7" stroke-width="1"/>
  
  <!-- Totals -->
  <text x="240" y="254" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#475569" text-anchor="end">Total Amount Due:</text>
  <text x="340" y="254" font-family="system-ui, sans-serif" font-size="12" font-weight="extrabold" fill="#0284c7" text-anchor="end">$325.00</text>
  
  <text x="40" y="272" font-family="system-ui, sans-serif" font-size="7" fill="#94a3b8">Thank you for letting us clean! Payment is due within 7 days.</text>
</svg>
